<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selección de Butacas | Cine Tradicional Xilotzin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    colors: { 
                        cinedark: '#1c140d', 
                        cinered: '#780000', 
                        cinegold: '#dca54c' 
                    }, 
                    fontFamily: { 
                        sans: ['Montserrat', 'sans-serif'],
                        serif: ['"Playfair Display"', 'serif'] 
                    } 
                } 
            } 
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-[#2a1e14] text-[#e8dbce] antialiased pb-24 md:pb-32 h-screen flex flex-col overflow-hidden border-x-[12px] border-cinered max-w-[1600px] mx-auto shadow-[0_0_50px_rgba(0,0,0,0.8)] relative">

    <header class="bg-cinered border-b-8 border-double border-cinegold shrink-0 z-40 shadow-[0_10px_20px_rgba(0,0,0,0.6)]">
        <div class="max-w-7xl mx-auto px-4 h-20 md:h-24 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="index.html" class="flex items-center justify-center w-10 h-10 md:w-12 md:h-12 bg-cinedark border-2 border-cinegold text-cinegold hover:bg-[#eec071] hover:text-cinedark transition-colors shadow-[2px_2px_0px_rgba(0,0,0,0.4)]">
                    <i class="fa-solid fa-arrow-left text-lg"></i>
                </a>
                <div class="flex flex-col">
                    <h1 id="titulo-peli" class="text-xl md:text-3xl font-serif font-black tracking-wider text-cinegold drop-shadow-[2px_2px_0px_rgba(0,0,0,0.6)] uppercase truncate max-w-[180px] md:max-w-md">Cargando...</h1>
                    <p id="horario-peli" class="text-[10px] md:text-xs font-sans font-bold tracking-[0.3em] text-[#e8dbce] uppercase"></p>
                </div>
            </div>
            <div class="text-right bg-cinedark border-2 border-[#574433] py-2 px-4 shadow-[inset_2px_2px_5px_rgba(0,0,0,0.5)] hidden md:block">
                <p class="text-[10px] font-bold text-[#a69b8d] uppercase tracking-[0.2em]">Admisión General</p>
                <p class="text-xl font-serif font-black text-cinegold">$50.00 <span class="text-[10px] font-sans text-[#e8dbce]">MXN</span></p>
            </div>
        </div>
    </header>

    <div class="bg-cinedark border-b-4 border-cinegold py-3 shrink-0 z-30 shadow-[0_4px_10px_rgba(0,0,0,0.4)]">
        <div class="flex justify-center gap-6 md:gap-12 text-[10px] md:text-xs font-bold text-[#a69b8d] uppercase tracking-widest font-sans">
            <div class="flex items-center gap-2 md:gap-3"><div class="w-5 h-5 md:w-6 md:h-6 border-2 border-[#574433] rounded-t-md bg-[#3d2c1f] shadow-[inset_0_-3px_0_rgba(0,0,0,0.6)]"></div> Disponible</div>
            <div class="flex items-center gap-2 md:gap-3"><div class="w-5 h-5 md:w-6 md:h-6 bg-cinegold border-2 border-[#b8860b] shadow-[2px_2px_0px_rgba(0,0,0,0.5)] rounded-t-md"></div> Tu Selección</div>
            <div class="flex items-center gap-2 md:gap-3"><div class="w-5 h-5 md:w-6 md:h-6 bg-cinered/60 border-2 border-cinered rounded-t-md flex items-center justify-center shadow-[inset_0_-3px_0_rgba(0,0,0,0.6)]"><i class="fa-solid fa-xmark text-[10px] text-cinedark"></i></div> Ocupado</div>
        </div>
    </div>

    <main class="relative flex-grow w-full bg-[#2a1e14] overflow-hidden">
        <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1519114056088-b877fe073a5e?q=80&w=2069&auto=format&fit=crop')] bg-cover bg-center bg-no-repeat opacity-10 sepia contrast-150 z-0 pointer-events-none"></div>

        <div class="absolute right-4 md:right-8 top-8 z-20 flex flex-col gap-2 bg-cinedark p-2 border-2 border-cinegold shadow-[4px_4px_0px_rgba(0,0,0,0.6)]">
            <button onclick="zoomIn()" class="w-10 h-10 bg-[#3d2c1f] hover:bg-cinegold text-cinegold hover:text-cinedark border border-[#574433] font-bold transition-colors"><i class="fa-solid fa-plus"></i></button>
            <button onclick="resetZoom()" class="w-10 h-10 bg-[#3d2c1f] hover:bg-cinegold text-cinegold hover:text-cinedark border border-[#574433] font-bold transition-colors text-sm"><i class="fa-solid fa-expand"></i></button>
            <button onclick="zoomOut()" class="w-10 h-10 bg-[#3d2c1f] hover:bg-cinegold text-cinegold hover:text-cinedark border border-[#574433] font-bold transition-colors"><i class="fa-solid fa-minus"></i></button>
        </div>

        <div id="map-scroll" class="w-full h-full overflow-auto grab hide-scroll relative z-10">
            <div id="map-content" class="min-w-[1000px] md:min-w-[1200px] p-10 mx-auto transform origin-top transition-transform duration-300 ease-out flex flex-col items-center">
                
                <div class="w-3/4 max-w-3xl h-24 border-t-8 border-double border-cinegold rounded-t-[40%] mb-16 relative bg-gradient-to-b from-cinegold/10 to-transparent flex justify-center shadow-[inset_0_20px_30px_-10px_rgba(220,165,76,0.2)]">
                    <div class="absolute -top-6 bg-cinedark px-8 py-2 border-2 border-cinegold text-xs font-serif font-black text-cinegold tracking-[0.4em] uppercase shadow-[4px_4px_0px_rgba(0,0,0,0.5)]">
                        Escenario / Pantalla
                    </div>
                </div>

                <div id="seating-grid" class="flex flex-col gap-3 md:gap-4 items-center pb-20"></div>

            </div>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 w-full bg-cinedark border-t-8 border-double border-cinegold p-4 md:p-6 shadow-[0_-10px_30px_rgba(0,0,0,0.9)] z-50">
        <div class="max-w-7xl mx-auto flex flex-row justify-between items-center gap-4">
            <div>
                <p id="texto-asientos" class="text-[10px] md:text-xs font-bold text-[#a69b8d] uppercase tracking-[0.2em] mb-1 font-sans">0 Asientos</p>
                <p class="text-2xl md:text-4xl font-serif font-black text-cinered leading-none drop-shadow-[1px_1px_0px_rgba(0,0,0,0.8)]">$<span id="texto-precio">0</span> <span class="text-[10px] md:text-xs text-cinegold font-sans font-bold">MXN</span></p>
            </div>
            <button id="btn-continuar" onclick="avanzarPago()" disabled class="bg-[#3d2c1f] text-[#a69b8d] border-2 border-dashed border-[#574433] font-serif font-black py-3 md:py-4 px-6 md:px-12 transition-all uppercase tracking-widest cursor-not-allowed shadow-[4px_4px_0px_rgba(0,0,0,0.4)] md:text-lg">
                Pagar Boletos
            </button>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
