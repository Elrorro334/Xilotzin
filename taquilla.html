<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punto de Venta | Taquilla Xilotzin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    colors: { 
                        cinedark: '#1c140d', 
                        cinered: '#780000', 
                        cinegold: '#dca54c' 
                    }, 
                    fontFamily: { 
                        sans: ['Montserrat', 'sans-serif'],
                        serif: ['"Playfair Display"', 'serif'] 
                    } 
                } 
            } 
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-cinedark text-[#e8dbce] antialiased h-screen flex flex-col overflow-hidden selection:bg-cinered selection:text-cinegold">

    <header class="bg-cinered border-b-4 border-cinegold shrink-0 z-40 px-6 py-3 flex justify-between items-center shadow-[0_4px_10px_rgba(0,0,0,0.5)]">
        <div class="flex items-center gap-4">
            <div class="bg-cinedark border-2 border-cinegold w-10 h-10 flex items-center justify-center text-cinegold">
                <i class="fa-solid fa-desktop"></i>
            </div>
            <div>
                <h1 class="text-xl font-serif font-black uppercase text-cinegold tracking-widest leading-none">Terminal POS</h1>
                <p class="text-[10px] font-sans font-bold uppercase tracking-[0.2em] text-[#e8dbce]">Cine Teatro Xilotzin • Taquilla 1</p>
            </div>
        </div>
        <a href="index.html" class="bg-cinedark text-cinegold px-4 py-2 border border-cinegold font-sans font-bold text-xs uppercase tracking-widest hover:bg-cinegold hover:text-cinedark transition-colors">
            Cerrar Sesión
        </a>
    </header>

    <main class="flex-grow flex flex-col lg:flex-row overflow-hidden">
        
        <section class="w-full lg:w-1/3 bg-[#2a1e14] border-r-4 border-double border-[#574433] flex flex-col h-full overflow-y-auto custom-scrollbar p-4">
            <h2 class="text-xs font-sans font-bold uppercase tracking-[0.3em] text-[#a69b8d] mb-4 border-b border-[#574433] pb-2">1. Seleccionar Función</h2>
            <div id="pos-cartelera" class="flex flex-col gap-4"></div>
        </section>

        <section class="w-full lg:w-1/3 bg-cinedark flex flex-col h-full relative border-r-4 border-double border-[#574433]">
            <div class="p-4 border-b border-[#574433] shrink-0 bg-[#261c14]">
                <h2 class="text-xs font-sans font-bold uppercase tracking-[0.3em] text-[#a69b8d] mb-2">2. Asignar Localidades</h2>
                <h3 id="pos-titulo-peli" class="text-lg font-serif font-black text-cinegold uppercase truncate">Seleccione una función</h3>
                <p id="pos-horario-peli" class="text-[10px] font-sans font-bold text-cinered uppercase tracking-widest"></p>
            </div>
            
            <div class="flex-grow overflow-auto p-4 flex flex-col items-center justify-center relative">
                <div id="pos-pantalla" class="w-3/4 h-8 border-t-4 border-cinegold rounded-t-[50%] mb-8 relative flex justify-center hidden">
                    <span class="absolute -top-4 bg-cinedark px-4 py-1 border border-cinegold text-[8px] font-serif font-black text-cinegold tracking-widest uppercase">Pantalla</span>
                </div>
                <div id="pos-asientos" class="flex flex-col gap-2 items-center">
                    <p class="text-[#574433] text-sm font-serif italic text-center">Esperando selección de película...</p>
                </div>
            </div>
        </section>

        <section class="w-full lg:w-1/3 bg-[#e8dbce] text-cinedark flex flex-col h-full shadow-[inset_10px_0_20px_rgba(0,0,0,0.5)]">
            <div class="p-6 border-b-4 border-double border-[#574433] shrink-0 bg-[#d5c5b3]">
                <h2 class="text-xs font-sans font-black uppercase tracking-[0.3em] text-[#574433] mb-1">3. Resumen de Venta</h2>
            </div>
            
            <div class="flex-grow p-6 flex flex-col">
                <div class="bg-white border-2 border-dashed border-[#574433] p-4 flex-grow relative shadow-sm">
                    <p class="text-center font-serif font-black text-xl mb-4 border-b-2 border-cinedark pb-2 uppercase text-cinered">Ticket de Venta</p>
                    
                    <div class="space-y-4 font-sans text-sm font-bold">
                        <div class="flex justify-between border-b border-gray-200 pb-2">
                            <span class="text-gray-500 uppercase">Película</span>
                            <span id="ticket-peli" class="text-right truncate max-w-[150px]">-</span>
                        </div>
                        <div class="flex justify-between border-b border-gray-200 pb-2">
                            <span class="text-gray-500 uppercase">Horario</span>
                            <span id="ticket-horario">-</span>
                        </div>
                        <div class="flex justify-between border-b border-gray-200 pb-2">
                            <span class="text-gray-500 uppercase">Cant. Boletos</span>
                            <span id="ticket-cantidad">0</span>
                        </div>
                        <div class="flex justify-between border-b border-gray-200 pb-2">
                            <span class="text-gray-500 uppercase">Asientos</span>
                            <span id="ticket-asientos" class="text-right max-w-[150px] break-words text-cinered">-</span>
                        </div>
                    </div>

                    <div class="absolute bottom-4 left-4 right-4 border-t-4 border-double border-cinedark pt-4">
                        <div class="flex justify-between items-end">
                            <span class="font-sans font-black uppercase text-gray-500 tracking-widest text-xs">Total</span>
                            <span class="text-3xl font-serif font-black text-cinedark">$<span id="ticket-total">0</span></span>
                        </div>
                    </div>
                </div>

                <div class="mt-6 flex flex-col gap-3 shrink-0">
                    <button id="btn-efectivo" onclick="procesarVentaPOS('EFECTIVO')" disabled class="w-full bg-green-700 hover:bg-green-800 disabled:bg-gray-400 text-white font-sans font-black py-4 uppercase tracking-widest transition-colors shadow-md flex items-center justify-center gap-3">
                        <i class="fa-solid fa-money-bill-wave"></i> Cobrar Efectivo
                    </button>
                    <button id="btn-tarjeta" onclick="procesarVentaPOS('TARJETA')" disabled class="w-full bg-blue-700 hover:bg-blue-800 disabled:bg-gray-400 text-white font-sans font-black py-4 uppercase tracking-widest transition-colors shadow-md flex items-center justify-center gap-3">
                        <i class="fa-solid fa-credit-card"></i> Terminal Bancaria
                    </button>
                </div>
            </div>
        </section>

    </main>

    <script src="js/data.js"></script>
    <script>
        let posSeleccion = { pelicula: null, horario: null, asientos: [], total: 0 };
        const precioTaquilla = typeof cineData !== 'undefined' ? cineData.precioBoleto : 50;

        document.addEventListener('DOMContentLoaded', () => {
            renderCarteleraPOS();
        });

        function renderCarteleraPOS() {
            const contenedor = document.getElementById('pos-cartelera');
            if (typeof cineData === 'undefined') return;

            contenedor.innerHTML = cineData.peliculas.map(p => `
                <div class="bg-cinedark border border-[#574433] p-3 flex gap-4 cursor-pointer hover:border-cinegold transition-colors" onclick="activarFuncionPOS(${p.id})">
                    <img src="${p.poster}" class="w-16 h-24 object-cover sepia-[.3]">
                    <div class="flex flex-col flex-grow">
                        <h3 class="font-serif font-black text-cinegold uppercase text-sm mb-1">${p.titulo}</h3>
                        <p class="text-[10px] font-sans text-[#a69b8d] mb-2 uppercase">${p.clasificacion}</p>
                        <div class="flex flex-wrap gap-2 mt-auto" id="btn-group-${p.id}">
                            ${p.horarios.map(h => `
                                <button onclick="event.stopPropagation(); setFuncionPOS('${p.titulo}', '${h}')" class="bg-[#3d2c1f] hover:bg-cinered text-[#e8dbce] text-[10px] font-bold px-2 py-1 uppercase border border-[#574433]">
                                    ${h}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function activarFuncionPOS(id) {
            document.querySelectorAll('[id^="btn-group-"]').forEach(el => el.classList.remove('ring-2', 'ring-cinegold'));
            document.getElementById(`btn-group-${id}`).classList.add('ring-2', 'ring-cinegold');
        }

        function setFuncionPOS(titulo, horario) {
            posSeleccion.pelicula = titulo;
            posSeleccion.horario = horario;
            posSeleccion.asientos = [];
            posSeleccion.total = 0;

            document.getElementById('pos-titulo-peli').innerText = titulo;
            document.getElementById('pos-horario-peli').innerText = `HOY • ${horario}`;
            document.getElementById('pos-pantalla').classList.remove('hidden');

            renderMapaPOS();
            actualizarTicketPOS();
        }

        function renderMapaPOS() {
            const grid = document.getElementById('pos-asientos');
            grid.innerHTML = '';
            
            const filas = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J'];
            const distribucion = [4, 6, 4]; 

            filas.forEach(letra => {
                const filaDiv = document.createElement('div');
                filaDiv.className = 'flex gap-3 justify-center items-center';
                filaDiv.insertAdjacentHTML('beforeend', `<span class="w-4 text-center text-cinegold font-serif font-black text-xs">${letra}</span>`);

                let num = 1;
                distribucion.forEach(bloque => {
                    const bloqueDiv = document.createElement('div');
                    bloqueDiv.className = 'flex gap-1';
                    for(let i=0; i<bloque; i++) {
                        const idAsiento = `${letra}${num}`;
                        const ocupado = Math.random() < 0.2;
                        
                        const btn = document.createElement('button');
                        if(ocupado) {
                            btn.className = 'w-6 h-7 bg-cinered/50 border border-cinered cursor-not-allowed text-[8px] flex items-center justify-center text-cinedark';
                            btn.innerHTML = '<i class="fa-solid fa-xmark"></i>';
                        } else {
                            btn.className = 'w-6 h-7 bg-[#3d2c1f] border border-[#574433] text-[8px] font-bold text-[#a69b8d] hover:border-cinegold transition-colors';
                            btn.innerText = num;
                            btn.onclick = function() { toggleAsientoPOS(this, idAsiento); };
                        }
                        bloqueDiv.appendChild(btn);
                        num++;
                    }
                    filaDiv.appendChild(bloqueDiv);
                });
                filaDiv.insertAdjacentHTML('beforeend', `<span class="w-4 text-center text-cinegold font-serif font-black text-xs">${letra}</span>`);
                grid.appendChild(filaDiv);
            });
        }

        function toggleAsientoPOS(btn, id) {
            if(posSeleccion.asientos.includes(id)) {
                posSeleccion.asientos = posSeleccion.asientos.filter(a => a !== id);
                btn.classList.remove('bg-cinegold', 'text-cinedark', 'border-white');
                btn.classList.add('bg-[#3d2c1f]', 'text-[#a69b8d]', 'border-[#574433]');
            } else {
                posSeleccion.asientos.push(id);
                btn.classList.remove('bg-[#3d2c1f]', 'text-[#a69b8d]', 'border-[#574433]');
                btn.classList.add('bg-cinegold', 'text-cinedark', 'border-white');
            }
            actualizarTicketPOS();
        }

        function actualizarTicketPOS() {
            posSeleccion.total = posSeleccion.asientos.length * precioTaquilla;
            
            document.getElementById('ticket-peli').innerText = posSeleccion.pelicula || '-';
            document.getElementById('ticket-horario').innerText = posSeleccion.horario || '-';
            document.getElementById('ticket-cantidad').innerText = posSeleccion.asientos.length;
            document.getElementById('ticket-asientos').innerText = posSeleccion.asientos.length > 0 ? posSeleccion.asientos.join(', ') : '-';
            document.getElementById('ticket-total').innerText = posSeleccion.total;

            const habilitarPago = posSeleccion.asientos.length > 0;
            document.getElementById('btn-efectivo').disabled = !habilitarPago;
            document.getElementById('btn-tarjeta').disabled = !habilitarPago;
        }

        function procesarVentaPOS(metodoPago) {
            alert(`TRANSACCIÓN APROBADA EN TAQUILLA\nMétodo: ${metodoPago}\nTotal Cobrado: $${posSeleccion.total} MXN\nImprimiendo boletos físicos...`);
            setFuncionPOS(posSeleccion.pelicula, posSeleccion.horario);
        }
    </script>
</body>
</html>
