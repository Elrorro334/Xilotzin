<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago Seguro | Cine Xilotzin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { cinedark: '#0a0a0a', cinered: '#b20710', cinegold: '#fbbf24', ticket: '#fef3c7', tickettext: '#450a0a' } } } }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-cinedark text-white antialiased">
    
    <header class="py-6 px-6 max-w-6xl mx-auto">
        <a href="asientos.html" class="text-gray-400 hover:text-white font-bold text-sm tracking-widest uppercase"><i class="fa-solid fa-arrow-left"></i> Modificar Butacas</a>
    </header>

    <main class="max-w-6xl mx-auto px-6 pb-20" id="resumen-boleto">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10 items-start">
            
            <div class="lg:col-span-5 bg-ticket p-8 rounded-xl ticket-cutout shadow-2xl text-tickettext border-2 border-dashed border-red-900/30">
                <p class="text-red-900/60 font-black tracking-[0.3em] uppercase text-xs mb-6 text-center">Admisión General</p>
                <h3 id="resumen-titulo" class="font-black text-4xl mb-2 uppercase leading-none">Cargando...</h3>
                <p id="resumen-horario" class="text-lg font-bold text-red-900 mb-8 border-b-2 border-red-900/20 pb-4"></p>
                
                <div class="space-y-4 mb-10">
                    <div class="flex justify-between items-center bg-white/50 p-3 rounded-lg font-bold">
                        <span id="resumen-boletos" class="uppercase tracking-wider text-sm">Boletos (0)</span>
                    </div>
                    <div class="flex justify-between items-center px-3 font-bold">
                        <span class="uppercase tracking-wider text-sm text-red-900/60">Asientos</span>
                        <span id="resumen-asientos" class="font-black text-2xl text-red-900"></span>
                    </div>
                </div>
                
                <div class="flex justify-between items-end border-t-4 border-red-900 pt-6">
                    <span class="font-black text-xl uppercase tracking-widest">Total a Pagar</span>
                    <span class="text-5xl font-black text-red-900 tracking-tighter">$<span id="resumen-total">0</span></span>
                </div>
            </div>

            <div class="lg:col-span-7 bg-white/5 border border-white/10 p-8 rounded-2xl shadow-2xl">
                <div class="flex items-center gap-3 mb-8 border-b border-white/10 pb-6">
                    <div class="bg-green-500/20 p-3 rounded-full text-green-500"><i class="fa-solid fa-lock text-xl"></i></div>
                    <div>
                        <h2 class="text-2xl font-black uppercase tracking-wide">Pago Seguro</h2>
                        <p class="text-gray-400 text-sm font-semibold">Tus datos están encriptados y validados.</p>
                    </div>
                </div>

                <form onsubmit="procesarPago(event)" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Nombre Completo</label>
                            <input type="text" placeholder="Ej. Juan Pérez" required oninput="this.value = this.value.replace(/[^a-zA-ZáéíóúÁÉÍÓÚñÑ\s]/g, '').substring(0, 40)" class="w-full bg-cinedark border-2 border-white/10 rounded-xl py-4 px-5 text-white font-bold focus:border-cinegold focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Correo para recibo</label>
                            <input type="email" placeholder="correo@ejemplo.com" required maxlength="50" class="w-full bg-cinedark border-2 border-white/10 rounded-xl py-4 px-5 text-white font-bold focus:border-cinegold focus:outline-none">
                        </div>
                    </div>

                    <div class="pt-4 border-t border-white/10">
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Número de Tarjeta</label>
                        <div class="relative">
                            <input type="text" placeholder="0000000000000000" required oninput="this.value = this.value.replace(/[^0-9]/g, '').substring(0, 16)" class="w-full bg-cinedark border-2 border-white/10 rounded-xl py-4 px-5 pl-14 text-white font-mono text-lg focus:border-cinegold focus:outline-none">
                            <i class="fa-brands fa-cc-visa absolute left-5 top-5 text-gray-400 text-2xl"></i>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Vencimiento</label>
                            <input type="text" placeholder="MM/AA" required oninput="this.value = this.value.replace(/[^0-9\/]/g, '').substring(0, 5)" class="w-full bg-cinedark border-2 border-white/10 rounded-xl py-4 px-5 text-center text-white font-mono text-lg focus:border-cinegold focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">CVV</label>
                            <input type="password" placeholder="***" required oninput="this.value = this.value.replace(/[^0-9]/g, '').substring(0, 4)" class="w-full bg-cinedark border-2 border-white/10 rounded-xl py-4 px-5 text-center text-white font-mono text-lg focus:border-cinegold focus:outline-none">
                        </div>
                    </div>

                    <button type="submit" id="btnSubmit" class="w-full bg-cinered hover:bg-red-700 text-white font-black py-5 rounded-xl mt-8 transition-all shadow-[0_10px_30px_rgba(178,7,16,0.3)] hover:shadow-[0_15px_40px_rgba(178,7,16,0.6)] uppercase tracking-widest text-xl flex justify-center items-center gap-3">
                        Pagar $<span id="btn-total">0</span> MXN <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
