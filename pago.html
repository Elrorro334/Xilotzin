<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taquilla | Cine Tradicional Xilotzin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    colors: { 
                        cinedark: '#1c140d', 
                        cinered: '#780000', 
                        cinegold: '#dca54c' 
                    }, 
                    fontFamily: { 
                        sans: ['Montserrat', 'sans-serif'],
                        serif: ['"Playfair Display"', 'serif'] 
                    } 
                } 
            } 
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-cinedark text-[#e8dbce] antialiased selection:bg-cinered selection:text-cinegold border-x-[12px] border-cinered max-w-[1600px] mx-auto min-h-screen shadow-[0_0_50px_rgba(0,0,0,0.8)] flex flex-col">

    <header class="bg-cinered border-b-8 border-double border-cinegold sticky top-0 z-50 shadow-[0_10px_20px_rgba(0,0,0,0.6)]">
        <div class="max-w-6xl mx-auto px-4 h-24 flex items-center">
            <a href="asientos.html" class="flex items-center gap-3 text-cinegold hover:text-[#e8dbce] transition-colors font-serif font-bold uppercase tracking-widest text-sm md:text-base">
                <i class="fa-solid fa-arrow-left border-2 border-cinegold rounded-full w-10 h-10 flex items-center justify-center bg-cinedark shadow-[2px_2px_0px_rgba(0,0,0,0.4)]"></i>
                <span>Volver a Sala</span>
            </a>
            <div class="ml-auto flex flex-col text-right">
                <h1 class="text-xl md:text-3xl font-serif font-black tracking-wider text-cinegold drop-shadow-[2px_2px_0px_rgba(0,0,0,0.6)] uppercase">Taquilla</h1>
                <span class="text-[8px] md:text-[10px] font-sans tracking-[0.4em] text-[#e8dbce] uppercase">Emisión de Boletos</span>
            </div>
        </div>
    </header>

    <main class="flex-grow w-full bg-[#2a1e14] p-6 md:p-12 relative border-b-4 border-cinegold">
        <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1519114056088-b877fe073a5e?q=80&w=2069&auto=format&fit=crop')] bg-cover bg-center bg-no-repeat opacity-10 sepia contrast-150 z-0"></div>
        
        <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-10 items-start relative z-10" id="resumen-boleto">
            
            <div class="lg:col-span-5 bg-[#e8dbce] text-cinedark p-8 border-8 border-double border-[#574433] shadow-[12px_12px_0px_rgba(0,0,0,0.8)] relative transform rotate-1">
                <div class="absolute -top-4 left-1/2 -translate-x-1/2 bg-cinered px-6 py-1 border border-[#574433] text-cinegold font-sans font-black text-xs uppercase tracking-[0.3em] shadow-[2px_2px_0px_rgba(0,0,0,0.5)]">Boleto a Emitir</div>
                
                <p class="text-[#574433] font-bold tracking-[0.2em] uppercase text-[10px] md:text-xs mb-4 text-center mt-4">Admisión General</p>
                <h3 id="resumen-titulo" class="font-serif font-black text-3xl md:text-4xl mb-2 uppercase leading-none text-center">Cargando...</h3>
                <p id="resumen-horario" class="text-lg md:text-xl font-sans font-black text-cinered mb-8 border-b-2 border-dashed border-[#574433] pb-4 text-center"></p>
                
                <div class="space-y-6 mb-10 font-sans px-2">
                    <div class="flex justify-between items-end border-b border-[#574433]/30 pb-2">
                        <span id="resumen-boletos" class="uppercase tracking-widest text-xs font-bold text-[#574433]">Boletos (0)</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="uppercase tracking-widest text-xs font-bold text-[#574433]">Localidades</span>
                        <span id="resumen-asientos" class="font-black text-xl md:text-2xl text-cinedark break-words max-w-[60%] text-right"></span>
                    </div>
                </div>
                
                <div class="flex justify-between items-end border-t-4 border-double border-[#574433] pt-6 px-2">
                    <span class="font-sans font-black text-xs md:text-sm uppercase tracking-widest text-[#574433]">Importe Total</span>
                    <span class="text-4xl md:text-5xl font-serif font-black text-cinered">$<span id="resumen-total">0</span></span>
                </div>
            </div>

            <div class="lg:col-span-7 bg-[#261c14] border-4 border-cinegold p-8 md:p-10 shadow-[8px_8px_0px_rgba(0,0,0,0.6)]">
                <div class="flex items-center gap-4 mb-8 border-b border-dashed border-[#574433] pb-6">
                    <div class="bg-cinedark border-2 border-cinegold w-14 h-14 rounded-full flex items-center justify-center text-cinegold shadow-[inset_0_0_10px_rgba(0,0,0,0.8)]"><i class="fa-solid fa-lock text-xl"></i></div>
                    <div>
                        <h2 class="text-2xl font-serif font-black uppercase tracking-widest text-cinegold">Pago en Taquilla</h2>
                        <p class="text-[#a69b8d] text-xs font-sans font-bold uppercase tracking-widest mt-1">Transacción cifrada y segura</p>
                    </div>
                </div>

                <form onsubmit="procesarPago(event)" class="space-y-6 font-sans">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-[10px] md:text-xs font-bold text-cinegold uppercase tracking-widest mb-2">Titular de la Tarjeta</label>
                            <input type="text" placeholder="Ej. Juan Pérez" required oninput="this.value = this.value.replace(/[^a-zA-ZáéíóúÁÉÍÓÚñÑ\s]/g, '').substring(0, 40)" class="w-full bg-[#1c140d] border border-[#574433] py-4 px-5 text-[#e8dbce] font-bold focus:border-cinegold focus:outline-none focus:ring-1 focus:ring-cinegold shadow-[inset_2px_2px_5px_rgba(0,0,0,0.5)]">
                        </div>
                        <div>
                            <label class="block text-[10px] md:text-xs font-bold text-cinegold uppercase tracking-widest mb-2">Correo para Comprobante</label>
                            <input type="email" placeholder="correo@ejemplo.com" required maxlength="50" class="w-full bg-[#1c140d] border border-[#574433] py-4 px-5 text-[#e8dbce] font-bold focus:border-cinegold focus:outline-none focus:ring-1 focus:ring-cinegold shadow-[inset_2px_2px_5px_rgba(0,0,0,0.5)]">
                        </div>
                    </div>

                    <div class="pt-4 border-t border-dashed border-[#574433]">
                        <label class="block text-[10px] md:text-xs font-bold text-cinegold uppercase tracking-widest mb-2">Número de Tarjeta</label>
                        <div class="relative">
                            <input type="text" placeholder="0000 0000 0000 0000" required oninput="this.value = this.value.replace(/[^0-9]/g, '').substring(0, 16)" class="w-full bg-[#1c140d] border border-[#574433] py-4 px-5 pl-14 text-cinegold font-mono text-lg md:text-xl tracking-widest focus:border-cinegold focus:outline-none focus:ring-1 focus:ring-cinegold shadow-[inset_2px_2px_5px_rgba(0,0,0,0.5)]">
                            <i class="fa-regular fa-credit-card absolute left-5 top-1/2 -translate-y-1/2 text-[#a69b8d] text-xl"></i>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="block text-[10px] md:text-xs font-bold text-cinegold uppercase tracking-widest mb-2">Vencimiento</label>
                            <input type="text" placeholder="MM/AA" required oninput="this.value = this.value.replace(/[^0-9\/]/g, '').substring(0, 5)" class="w-full bg-[#1c140d] border border-[#574433] py-4 px-5 text-center text-cinegold font-mono text-lg tracking-widest focus:border-cinegold focus:outline-none focus:ring-1 focus:ring-cinegold shadow-[inset_2px_2px_5px_rgba(0,0,0,0.5)]">
                        </div>
                        <div>
                            <label class="block text-[10px] md:text-xs font-bold text-cinegold uppercase tracking-widest mb-2">Código CVV</label>
                            <input type="password" placeholder="***" required oninput="this.value = this.value.replace(/[^0-9]/g, '').substring(0, 4)" class="w-full bg-[#1c140d] border border-[#574433] py-4 px-5 text-center text-cinegold font-mono text-lg tracking-widest focus:border-cinegold focus:outline-none focus:ring-1 focus:ring-cinegold shadow-[inset_2px_2px_5px_rgba(0,0,0,0.5)]">
                        </div>
                    </div>

                    <button type="submit" id="btnSubmit" class="w-full bg-cinered hover:bg-[#5a0000] text-cinegold border-2 border-dashed border-cinegold font-serif font-black py-5 mt-8 transition-colors shadow-[4px_4px_0px_rgba(0,0,0,0.6)] uppercase tracking-widest text-lg md:text-xl flex justify-center items-center gap-4">
                        Emitir Boleto • $<span id="btn-total">0</span> MXN
                    </button>
                </form>
            </div>
        </div>
    </main>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
