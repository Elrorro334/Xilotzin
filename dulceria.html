<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dulcería | Cine Tradicional Xilotzin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { cinedark: '#1c140d', cinered: '#780000', cinegold: '#dca54c' }, fontFamily: { sans: ['Montserrat', 'sans-serif'], serif: ['"Playfair Display"', 'serif'] } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-cinedark text-[#e8dbce] antialiased selection:bg-cinered selection:text-cinegold border-x-[12px] border-cinered max-w-[1600px] mx-auto min-h-screen shadow-[0_0_50px_rgba(0,0,0,0.8)] flex flex-col relative pb-24 md:pb-0">

    <header class="bg-cinered border-b-8 border-double border-cinegold sticky top-0 z-50 shadow-[0_10px_20px_rgba(0,0,0,0.6)]">
        <div class="max-w-6xl mx-auto px-4 h-24 flex items-center justify-between">
            <div class="flex items-center gap-4 cursor-pointer" onclick="window.location.href='index.html'">
                <i class="fa-solid fa-film text-cinegold text-4xl drop-shadow-[2px_2px_0px_rgba(0,0,0,0.5)]"></i>
                <div class="flex flex-col">
                    <h1 class="text-3xl md:text-5xl font-serif font-black tracking-wider text-cinegold drop-shadow-[3px_3px_0px_rgba(0,0,0,0.6)] uppercase">Xilotzin</h1>
                    <span class="text-[10px] md:text-xs font-sans tracking-[0.4em] text-[#e8dbce] uppercase">Cine Tradicional</span>
                </div>
            </div>
            
            <div class="flex items-center gap-8">
                <nav class="hidden md:flex gap-8 font-serif font-bold text-sm tracking-[0.1em] text-[#e8dbce]">
                    <a href="index.html" class="hover:text-cinegold transition-colors border-b border-transparent hover:border-cinegold pb-1">Cartelera</a>
                    <a href="#" class="text-cinegold border-b border-cinegold pb-1">Dulcería</a>
                </nav>
                <div class="w-px h-8 bg-cinegold/30 hidden md:block"></div>
                <a href="perfil.html" class="bg-cinegold text-cinedark px-6 py-2 border-2 border-dashed border-cinedark font-serif font-bold uppercase tracking-widest hover:bg-[#eec071] transition-colors shadow-[4px_4px_0px_rgba(0,0,0,0.4)] hidden md:flex items-center">
                    <i class="fa-solid fa-ticket mr-2"></i>Mis Boletos
                </a>
            </div>
        </div>
    </header>

    <div class="relative w-full h-[30vh] border-b-4 border-cinegold flex items-center justify-center overflow-hidden bg-[#2a1e14]">
        <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1585647347483-22b66260dfff?q=80&w=2070&auto=format&fit=crop')] bg-cover bg-center bg-no-repeat opacity-20 sepia contrast-150"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-cinedark via-transparent to-cinedark/50"></div>
        
        <div class="relative z-10 text-center px-6 max-w-3xl mx-auto flex flex-col items-center bg-cinedark/80 p-6 border-2 border-cinegold shadow-[8px_8px_0px_rgba(0,0,0,0.5)]">
            <h2 class="text-3xl md:text-5xl font-serif font-black uppercase tracking-widest text-cinegold mb-2 leading-tight">Nuestra Dulcería</h2>
            <p class="text-[#e8dbce] text-xs md:text-sm font-sans tracking-widest uppercase">Pide en línea • Recoge sin filas</p>
        </div>
    </div>

    <main class="max-w-6xl mx-auto px-4 md:px-6 py-12 relative z-20 flex flex-col lg:flex-row gap-10 items-start">
        
        <div class="w-full lg:w-2/3" id="menu-dulceria"></div>

        <div class="w-full lg:w-1/3 bg-[#e8dbce] border-8 border-double border-[#574433] p-6 shadow-[12px_12px_0px_rgba(0,0,0,0.8)] sticky top-32 text-cinedark hidden lg:block">
            <h3 class="font-serif font-black text-2xl uppercase tracking-widest border-b-2 border-dashed border-cinedark pb-4 mb-6 text-cinered text-center">Tu Pedido</h3>
            <div id="carrito-items-desktop" class="flex flex-col gap-4 mb-6 min-h-[150px] font-sans">
                <p class="text-center text-[#574433] italic mt-10">El carrito está vacío</p>
            </div>
            <div class="border-t-4 border-cinedark pt-4 mb-8">
                <div class="flex justify-between items-end">
                    <span class="font-sans font-black uppercase text-[#574433] tracking-widest text-sm">Total</span>
                    <span class="text-4xl font-serif font-black text-cinedark">$<span id="carrito-total-desktop">0</span></span>
                </div>
            </div>
            <button onclick="procesarDulceria()" class="w-full bg-cinered hover:bg-[#5a0000] text-cinegold border-2 border-dashed border-cinegold font-serif font-black py-4 transition-colors shadow-[4px_4px_0px_rgba(0,0,0,0.6)] uppercase tracking-widest text-lg">
                Pagar Pedido
            </button>
        </div>

    </main>

    <div class="fixed bottom-0 left-0 w-full bg-cinedark border-t-8 border-double border-cinegold p-4 shadow-[0_-10px_30px_rgba(0,0,0,0.9)] z-50 lg:hidden">
        <div class="max-w-7xl mx-auto flex flex-row justify-between items-center gap-4">
            <div>
                <p class="text-[10px] font-bold text-[#a69b8d] uppercase tracking-[0.2em] mb-1 font-sans"><span id="carrito-count-mobile">0</span> Productos</p>
                <p class="text-2xl font-serif font-black text-cinered leading-none drop-shadow-[1px_1px_0px_rgba(0,0,0,0.8)]">$<span id="carrito-total-mobile">0</span> <span class="text-[10px] text-cinegold font-sans font-bold">MXN</span></p>
            </div>
            <button onclick="procesarDulceria()" class="bg-[#3d2c1f] text-cinegold border-2 border-dashed border-cinegold font-serif font-black py-3 px-6 transition-all uppercase tracking-widest shadow-[4px_4px_0px_rgba(0,0,0,0.4)]">
                Ver Carrito
            </button>
        </div>
    </div>

    <script>
        const productosDulceria = [
            { id: 1, nombre: 'Combo Pareja', desc: '1 Palomitas Grandes + 2 Refrescos Medianos', precio: 180, img: 'https://images.unsplash.com/photo-1652362098670-8774da38682a?q=80&w=2000&auto=format&fit=crop' },
            { id: 2, nombre: 'Combo Nachos', desc: '1 Nachos Grandes + 1 Refresco Grande', precio: 140, img: 'https://images.unsplash.com/photo-1513456852971-30c0b8199d4d?q=80&w=2000&auto=format&fit=crop' },
            { id: 3, nombre: 'Palomitas Clásicas', desc: 'Cubeta Grande Mantequilla', precio: 85, img: 'https://images.unsplash.com/photo-1572177215152-32f247303126?q=80&w=2000&auto=format&fit=crop' },
            { id: 4, nombre: 'Refresco de Máquina', desc: 'Vaso Grande 32oz', precio: 60, img: 'https://images.unsplash.com/photo-1622483767028-3f66f32aef97?q=80&w=2000&auto=format&fit=crop' }
        ];

        let carrito = [];

        document.addEventListener('DOMContentLoaded', () => {
            renderProductos();
        });

        function renderProductos() {
            const grid = document.getElementById('menu-dulceria');
            grid.innerHTML = '<div class="grid grid-cols-1 md:grid-cols-2 gap-8">' + productosDulceria.map(p => `
                <div class="bg-[#261c14] border-2 border-cinegold flex flex-col shadow-[8px_8px_0px_rgba(0,0,0,0.6)] group">
                    <div class="w-full relative border-b-4 border-double border-[#3d2c1f] h-48 bg-black overflow-hidden">
                        <img src="${p.img}" class="object-cover w-full h-full opacity-70 sepia-[.4] group-hover:sepia-0 group-hover:scale-105 transition-all duration-500">
                        <div class="absolute top-0 right-0 bg-cinered text-cinegold font-serif font-black text-lg px-4 py-2 border-b border-l border-cinegold shadow-lg">$${p.precio}</div>
                    </div>
                    <div class="p-6 flex flex-col flex-grow text-center">
                        <h3 class="text-xl font-serif font-black uppercase text-cinegold tracking-wide mb-2">${p.nombre}</h3>
                        <p class="text-[#a69b8d] text-xs font-sans font-bold uppercase tracking-widest mb-6 border-b border-dashed border-[#574433] pb-4">${p.desc}</p>
                        <button onclick="agregarAlCarrito(${p.id})" class="mt-auto w-full bg-[#3d2c1f] hover:bg-cinegold text-cinegold hover:text-cinedark border-2 border-[#574433] font-serif font-black py-3 uppercase tracking-widest transition-colors shadow-[4px_4px_0px_rgba(0,0,0,0.4)] flex items-center justify-center gap-2">
                            <i class="fa-solid fa-cart-plus"></i> Agregar
                        </button>
                    </div>
                </div>
            `).join('') + '</div>';
        }

        function agregarAlCarrito(id) {
            const producto = productosDulceria.find(p => p.id === id);
            const itemExistente = carrito.find(item => item.id === id);

            if (itemExistente) {
                itemExistente.cantidad += 1;
            } else {
                carrito.push({ ...producto, cantidad: 1 });
            }
            actualizarCarrito();
        }

        function removerDelCarrito(id) {
            carrito = carrito.filter(item => item.id !== id);
            actualizarCarrito();
        }

        function actualizarCarrito() {
            const total = carrito.reduce((sum, item) => sum + (item.precio * item.cantidad), 0);
            const count = carrito.reduce((sum, item) => sum + item.cantidad, 0);

            document.getElementById('carrito-total-desktop').innerText = total;
            document.getElementById('carrito-total-mobile').innerText = total;
            document.getElementById('carrito-count-mobile').innerText = count;

            const contenedor = document.getElementById('carrito-items-desktop');
            
            if (carrito.length === 0) {
                contenedor.innerHTML = '<p class="text-center text-[#574433] italic mt-10">El carrito está vacío</p>';
                return;
            }

            contenedor.innerHTML = carrito.map(item => `
                <div class="flex justify-between items-center border-b border-dashed border-[#574433] pb-3">
                    <div class="flex flex-col">
                        <span class="font-bold text-sm uppercase text-cinedark">${item.nombre}</span>
                        <span class="text-[10px] uppercase text-[#574433] tracking-widest">${item.cantidad} x $${item.precio}</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-serif font-black text-cinered text-lg">$${item.precio * item.cantidad}</span>
                        <button onclick="removerDelCarrito(${item.id})" class="text-cinered hover:text-[#5a0000]"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function procesarDulceria() {
            if (carrito.length === 0) {
                alert("Agrega productos al carrito primero.");
                return;
            }
            alert("Pedido confirmado. Tu código QR de dulcería ha sido generado.");
            carrito = [];
            actualizarCarrito();
        }
    </script>
</body>
</html>
